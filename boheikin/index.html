<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>母平均（回転数・TY）記録・区間推定アプリ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root {
  --bg:#080a0f; --panel:#0f1319; --panel2:#141a24;
  --border:#1c2333; --border2:#263044;
  --accent:#00d4ff; --accent2:#ff6b35;
  --green:#00ff88; --red:#ff3366; --yellow:#ffd700;
  --purple:#c084fc;
  --text:#c8d6e8; --muted:#3d4f6a; --muted2:#5a7094;
  --glow:0 0 14px rgba(0,212,255,0.35);
  --glow-g:0 0 10px rgba(0,255,136,0.3);
  --glow-p:0 0 10px rgba(192,132,252,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;max-width:480px;margin:0 auto;overflow-x:hidden}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border2);padding:8px 12px;display:flex;align-items:center;gap:8px}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--accent);text-shadow:var(--glow);flex:1}
.btn-icon{background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-icon:active{opacity:.7;transform:scale(.95)}

/* OVERLAY / SIDEBAR */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.7);display:none;align-items:flex-start;justify-content:flex-end}
.overlay.open{display:flex}
.sidebar{width:82%;max-width:320px;height:100%;background:var(--panel);border-left:1px solid var(--border2);display:flex;flex-direction:column;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.sidebar-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-head h2{font-size:10px;letter-spacing:2px;color:var(--muted2)}
.sidebar-body{flex:1;overflow-y:auto;padding:10px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.book-item{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--panel2);transition:all .15s}
.book-item.current{border-color:var(--accent);background:rgba(0,212,255,0.05)}
.book-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.book-item.current .book-dot{background:var(--accent);box-shadow:var(--glow)}
.book-info{flex:1;min-width:0}
.book-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{font-size:10px;color:var(--muted2);margin-top:2px}
.book-badge{font-size:9px;padding:2px 6px;border-radius:10px;background:var(--panel);border:1px solid var(--border);color:var(--muted2);white-space:nowrap;flex-shrink:0}
.btn-del-book{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px;flex-shrink:0}
.btn-del-book:hover{color:var(--red)}

/* MAIN */
.main{padding:10px 12px 100px}
.site-footer{text-align:center;padding:20px 0 10px;border-top:1px solid var(--border);margin-top:8px}
.site-footer a{font-size:11px;color:var(--muted2);text-decoration:none;letter-spacing:1px;margin:0 10px}
.site-footer a:hover{color:var(--accent)}

/* BOOK HEADER */
.book-header{background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:12px;margin-bottom:12px}
.book-title-input{width:100%;background:transparent;border:none;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;color:var(--text);outline:none;border-bottom:1px solid transparent;padding-bottom:2px;transition:border-color .2s}
.book-title-input:focus{border-color:var(--accent)}
.book-title-input::placeholder{color:var(--muted)}
.book-memo-input{width:100%;background:transparent;border:none;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--muted2);outline:none;margin-top:6px;resize:none;line-height:1.5}
.book-memo-input::placeholder{color:var(--muted)}

/* SETTINGS ROW */
.settings-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.setting-group{flex:1;min-width:0}
.setting-label{font-size:9px;color:var(--muted2);letter-spacing:1px;margin-bottom:4px}
.setting-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:6px 8px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
.setting-select:focus{border-color:var(--accent)}
.setting-custom{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:6px 8px;outline:none;margin-top:4px;display:none}
.setting-custom.visible{display:block}
.setting-custom:focus{border-color:var(--accent)}
.unit-badge{display:inline-block;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:12px;padding:3px 8px;font-size:10px;color:var(--accent);margin-top:6px}

/* TABS */
.tabs-outer{position:relative;margin-bottom:12px;border-bottom:1px solid var(--border2)}
.tabs-wrapper{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-right:44px;cursor:grab}
.tabs-wrapper::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 14px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted2);white-space:nowrap;transition:all .15s;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab.summary-tab{color:var(--yellow)}
.tab.summary-tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.tab-add-fixed{position:absolute;right:0;top:0;bottom:0;width:44px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--accent);background:linear-gradient(to right, transparent, var(--bg) 40%);border-bottom:1px solid var(--border2);z-index:10}
.tab-add-fixed:hover{color:var(--green)}

/* STAT CARDS */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.summary-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 6px 8px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.ca::before{background:var(--accent)}
.stat-card.co::before{background:var(--accent2)}
.stat-card.cg::before{background:var(--green)}
.stat-card.cy::before{background:var(--yellow)}
.stat-card.cp::before{background:var(--purple)}
.stat-label{font-size:8px;color:var(--muted2);letter-spacing:1px;margin-bottom:4px}
.stat-value{font-family:'Orbitron',sans-serif;font-size:19px;font-weight:700;line-height:1}
.va{color:var(--accent);text-shadow:var(--glow)}
.vo{color:var(--accent2)}
.vg{color:var(--green);text-shadow:var(--glow-g)}
.vy{color:var(--yellow)}
.vp{color:var(--purple);text-shadow:var(--glow-p)}
.stat-unit{font-size:8px;color:var(--muted);margin-top:2px}

/* COUNTER PANEL */
.collapsible-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none}
.collapsible-header-left{font-size:9px;color:var(--muted2);letter-spacing:2px}
.collapsible-toggle{font-size:11px;color:var(--muted2);transition:transform .2s}
.collapsible-toggle.open{transform:rotate(180deg)}
.collapsible-body{padding:12px;border-top:1px solid var(--border)}
.counter-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:flex-end}
.counter-init-wrap{display:flex;flex-direction:column;gap:3px}
.counter-init-label{font-size:8px;color:var(--muted2);letter-spacing:1px}
.counter-init-input{width:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;text-align:center;padding:6px 4px;outline:none;-webkit-appearance:none}
.counter-init-input:focus{border-color:var(--accent)}
.counter-display{text-align:center}
.counter-label{font-size:9px;color:var(--muted2);letter-spacing:1px;margin-bottom:4px}
.counter-value{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;color:var(--yellow);text-shadow:0 0 16px rgba(255,215,0,0.5);line-height:1}
.btn-counter-set{background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:6px;font-size:10px;padding:6px 10px;cursor:pointer;white-space:nowrap;align-self:flex-end}
.btn-counter-clear{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;font-size:10px;padding:6px 10px;cursor:pointer;white-space:nowrap;align-self:flex-end}

/* ROTATION COST */
.sigma-sub{font-size:10px;color:var(--muted2);text-align:right;margin-top:2px}
.sigma-sub-pos{color:var(--green)}
.sigma-sub-neg{color:#ff8fa3}

/* DETAIL SETTINGS */
.detail-settings-body .modal-field{margin-bottom:10px}
.detail-settings-body .modal-field label{display:block;font-size:9px;color:var(--muted2);letter-spacing:1px;margin-bottom:4px}
.detail-settings-body input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:8px 10px;outline:none;-webkit-appearance:none}
.detail-settings-body input:focus{border-color:var(--accent)}
.balance-divider{border:none;border-top:1px dashed var(--border2);margin:4px 0 12px}
.balance-section{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.balance-title{font-size:9px;color:var(--muted2);letter-spacing:2px;margin-bottom:10px}
.balance-input-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:center;margin-bottom:8px}
.balance-input-wrap{display:flex;flex-direction:column;gap:3px}
.balance-input-label{font-size:8px;color:var(--muted2);letter-spacing:1px}
.balance-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Orbitron',sans-serif;font-size:16px;text-align:center;padding:8px 4px;outline:none;-webkit-appearance:none}
.balance-input:focus{border-color:var(--accent);box-shadow:var(--glow)}
.balance-input::placeholder{color:var(--muted);font-size:11px;font-family:'Noto Sans JP',sans-serif}
.btn-balance-add{background:var(--green);color:#000;border:none;border-radius:6px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;padding:10px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;align-self:flex-end}
.btn-balance-add:active{transform:scale(.95)}
.balance-log{max-height:90px;overflow-y:auto;margin-bottom:10px}
.balance-log-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.balance-log-item:last-child{border-bottom:none}
.bl-num{color:var(--muted);font-size:9px;width:16px;flex-shrink:0}
.bl-inv{color:var(--accent2);font-family:'Orbitron',sans-serif;font-size:11px;flex:1;text-align:center}
.bl-rec{color:var(--green);font-family:'Orbitron',sans-serif;font-size:11px;flex:1;text-align:center}
.bl-diff{font-family:'Orbitron',sans-serif;font-size:11px;flex:1;text-align:center}
.bl-pos{color:var(--green)}
.bl-neg{color:var(--red)}
.bl-del{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;flex-shrink:0}
.balance-total{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;text-align:center}
.bt-label{font-size:8px;color:var(--muted2);letter-spacing:1px;margin-bottom:3px}
.bt-val{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700}

/* SIGMA PANEL */
.sigma-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.panel-title{font-size:9px;color:var(--muted2);letter-spacing:2px;margin-bottom:10px}
.sigma-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.sigma-row:last-of-type{border-bottom:none}
.sigma-label{font-size:11px;color:var(--text)}
.sigma-val{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700}
.sg{color:var(--green)}.sy{color:var(--yellow)}.sa{color:var(--accent)}.sm{color:var(--muted2)}
.need-data{text-align:center;color:var(--muted);font-size:11px;padding:10px 0}
.dist-bar{height:6px;background:var(--bg);border-radius:3px;margin-top:10px;position:relative}
.bar-2s{position:absolute;height:100%;border-radius:3px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.3)}
.bar-1s{position:absolute;height:100%;border-radius:3px;background:rgba(0,255,136,0.12);border:1px solid rgba(0,255,136,0.4)}
.bar-mean{position:absolute;width:2px;height:14px;top:-4px;background:var(--accent);border-radius:1px;box-shadow:var(--glow)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.detail-item{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px}
.detail-key{font-size:8px;color:var(--muted);letter-spacing:1px}
.detail-val{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--text);margin-top:2px}
.judge-badge{text-align:center;padding:7px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:2px;margin-top:10px;border:1px solid}
.j-stable{background:rgba(0,255,136,0.07);border-color:var(--green);color:var(--green)}
.j-normal{background:rgba(0,212,255,0.07);border-color:var(--accent);color:var(--accent)}
.j-unstable{background:rgba(255,51,102,0.07);border-color:var(--red);color:var(--red)}

/* INPUT */
.input-area{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.input-hint{font-size:10px;color:var(--accent);background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:6px;padding:6px 10px;margin-bottom:8px;text-align:center}
.input-row{display:flex;gap:8px;margin-top:8px}
input[type="number"]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:'Orbitron',sans-serif;font-size:26px;text-align:center;padding:10px;outline:none;-webkit-appearance:none}
input[type="number"]:focus{border-color:var(--accent);box-shadow:var(--glow)}
input[type="number"]::placeholder{color:var(--muted);font-size:13px;font-family:'Noto Sans JP',sans-serif}
.btn-add{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:12px;padding:10px 16px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.btn-add:active{transform:scale(.95);opacity:.85}
@keyframes flashBtn{
  0%{background:var(--accent);transform:scale(1)}
  30%{background:#fff;transform:scale(1.08);box-shadow:0 0 24px rgba(255,255,255,0.8)}
  100%{background:var(--accent);transform:scale(1)}
}
.btn-add.flash{animation:flashBtn 0.35s ease;}

/* HISTORY */
.history-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.btn-csv{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:6px;font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:1px;white-space:nowrap}
.btn-csv:active{opacity:.7}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);border-radius:4px;font-size:9px;padding:3px 8px;cursor:pointer;letter-spacing:1px}
.history-list{display:flex;flex-wrap:wrap;gap:6px;max-height:110px;overflow-y:auto}
.history-item{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:'Orbitron',sans-serif;font-size:12px;display:flex;align-items:center;gap:5px}
.h-num{color:var(--muted);font-size:9px}
.btn-del{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer}
.btn-del:hover{color:var(--red)}
.empty-msg{text-align:center;color:var(--muted);font-size:11px;padding:6px}

/* SUMMARY SHEET */
.summary-note{background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:10px;color:var(--yellow);letter-spacing:1px;text-align:center}
.sheet-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px}
.sc-name{font-size:10px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.sc-val{font-family:'Orbitron',sans-serif;font-size:15px;color:var(--text)}
.sc-sub{font-size:9px;color:var(--muted);margin-top:2px}

/* MODALS */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:20px;width:100%;max-width:340px}
.modal h3{font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:10px;color:var(--muted2);letter-spacing:1px;margin-bottom:5px}
.modal input[type="text"],.modal input[type="number"]{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:10px 12px;outline:none}
.modal input:focus{border-color:var(--accent)}
.modal select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none;cursor:pointer}
.modal select:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-ok{background:var(--accent);color:#000;border:none;border-radius:6px;padding:8px 20px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--muted2);border-radius:6px;padding:8px 16px;font-size:11px;cursor:pointer}
.modal-section{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px}
.modal-section-title{font-size:9px;color:var(--muted2);letter-spacing:2px;margin-bottom:8px}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>

<!-- MODAL: 新規ブック -->
<div class="modal-bg" id="newBookModal">
  <div class="modal">
    <h3>▸ 新しい台を追加</h3>
    <div class="modal-section">
      <div class="modal-section-title">▸ 台の情報</div>
      <div class="modal-field">
        <label>台名・店名・機種（任意）</label>
        <input type="text" id="nb_name" placeholder="例: ○○ホール 海物語 3番台" maxlength="40">
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">▸ 打ち方の設定</div>
      <div class="modal-field">
        <label>玉単価</label>
        <select id="nb_price">
          <option value="1">1円パチンコ</option>
          <option value="2">2円パチンコ</option>
          <option value="4" selected>4円パチンコ</option>
        </select>
      </div>
      <div class="modal-field">
        <label>1回あたりの打ち出し玉数</label>
        <select id="nb_balls">
          <option value="125">125玉</option>
          <option value="200">200玉</option>
          <option value="250" selected>250玉</option>
          <option value="500">500玉</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('newBookModal')">キャンセル</button>
      <button class="btn-ok" onclick="confirmNewBook()">追加</button>
    </div>
  </div>
</div>

<!-- MODAL: 新規シート -->
<div class="modal-bg" id="newSheetModal">
  <div class="modal">
    <h3>▸ 新しいセッションを追加</h3>
    <div class="modal-field">
      <label>セッション名</label>
      <input type="text" id="newSheetName" placeholder="例: 3/15・土曜日" maxlength="20">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('newSheetModal')">キャンセル</button>
      <button class="btn-ok" onclick="confirmNewSheet()">追加</button>
    </div>
  </div>
</div>

<!-- MODAL: インポート結果 -->

<!-- MODAL: シート名変更 -->
<div class="modal-bg" id="renameSheetModal">

</div>

<script>
// ════════════════════════════════
//  HELPERS
// ════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function todayStr(){const d=new Date();return`${d.getMonth()+1}/${d.getDate()}`}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtYen(n){return n.toLocaleString('ja-JP')}

// 1回あたりのコスト(円)
function costPerRound(bk){
  const price = parseFloat(bk.ballPrice)||4;
  const balls  = parseInt(bk.ballsPerRound)||250;
  return price * balls;
}
// 1000円あたりの玉数
function ballsPer1000(bk){
  const price=parseFloat(bk.ballPrice)||4;
  return Math.round(1000/price);
}

// ════════════════════════════════
//  STATE
// ════════════════════════════════
function defaultBook(){
  const bookId=uid(),sheetId=uid();
  return {id:bookId,name:'',memo:'',ballPrice:'4',ballsPerRound:'250',
    sheets:[{id:sheetId,name:todayStr(),data:[]}]};
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('pachi_v3'));
    if(s&&s.books&&s.books.length) return s;
  }catch(e){}
  const bk=defaultBook();
  return {books:[bk],currentBookId:bk.id,currentSheetId:bk.sheets[0].id};
}
function save(){localStorage.setItem('pachi_v3',JSON.stringify(state))}

let state=load();
function currentBook(){return state.books.find(b=>b.id===state.currentBookId)}
function currentSheet(){const bk=currentBook();return bk?.sheets.find(s=>s.id===state.currentSheetId)}

// ════════════════════════════════
//  STATS
// ════════════════════════════════
function tCrit(df,p){
  const t1={0.3173:1,0.0455:12.706},t2={0.3173:.816,0.0455:4.303},
        t3={0.3173:.765,0.0455:3.182},t4={0.3173:.741,0.0455:2.776},
        t5={0.3173:.727,0.0455:2.571};
  const tbl=[null,t1,t2,t3,t4,t5];
  if(df<=5)return(tbl[df]||t5)[p];
  if(df<=30){const z=p===0.3173?1:2;return Math.max(z+(z**3+z)/(4*df),z);}
  return p===0.3173?1:2;
}
function calcStats(data){
  const n=data.length; if(n<2) return null;
  const mean=data.reduce((a,b)=>a+b,0)/n;
  const variance=data.reduce((s,x)=>s+(x-mean)**2,0)/(n-1);
  const sd=Math.sqrt(variance), se=sd/Math.sqrt(n), df=n-1;
  const t1=tCrit(df,.3173), t2=tCrit(df,.0455);
  return{n,mean,variance,sd,se,df,
    lo1:mean-t1*se,hi1:mean+t1*se,
    lo2:mean-t2*se,hi2:mean+t2*se,
    cv:sd/mean*100};
}
function judge(cv){
  if(cv<15)return{cls:'j-stable',text:'🟢 安定している台'};
  if(cv<30)return{cls:'j-normal',text:'🔵 平均的なブレ幅'};
  return{cls:'j-unstable',text:'🔴 回転数のブレが大きい'};
}

// ════════════════════════════════
//  RENDER
// ════════════════════════════════
function render(){
  const bk=currentBook();
  if(!bk){renderEmpty();return;}
  renderSidebar();
  renderMain(bk);
  setTimeout(()=>{ initTabDrag(); scrollActiveTabIntoView(); },50);
}

function renderEmpty(){
  document.getElementById('mainContent').innerHTML=`
    <div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:16px">📋</div>
      <div style="font-size:13px;margin-bottom:16px">台が登録されていません</div>
      <button class="btn-add" onclick="openNewBookModal()">＋ 最初の台を追加</button>
    </div>`;}

function renderSidebar(){
  const el=document.getElementById('bookList');
  el.innerHTML=state.books.map(bk=>{
    const allData=bk.sheets.flatMap(s=>s.data);
    const n=allData.length;
    const avg=n>0?(allData.reduce((a,b)=>a+b,0)/n).toFixed(1):'—';
    const price=parseFloat(bk.ballPrice)||4;
    const balls=parseInt(bk.ballsPerRound)||250;
    const totalYen=n*(price*balls);
    return`<div class="book-item ${bk.id===state.currentBookId?'current':''}" onclick="switchBook('${bk.id}')">
      <div class="book-dot"></div>
      <div class="book-info">
        <div class="book-name">${escH(bk.name)||'（名称未設定）'}</div>
        <div class="book-meta">${price}円/${balls}玉 ｜ 投資 ${fmtYen(totalYen)}円 ｜ 平均 ${avg}回転</div>
      </div>
      ${state.books.length>1?`<button class="btn-del-book" onclick="deleteBook(event,'${bk.id}')">🗑</button>`:''}
    </div>`}).join('');}

function renderMain(bk){
  const isSummary=state.currentSheetId==='__summary__';
  const price=parseFloat(bk.ballPrice)||4;
  const balls=parseInt(bk.ballsPerRound)||250;
  const roundCost=price*balls;

  const tabs=`<div class="tabs-outer">
    <div class="tabs-wrapper" id="tabsWrapper">
      <div class="tab summary-tab ${isSummary?'active':''}" onclick="switchSheet('__summary__')">📊 総合</div>
      ${bk.sheets.map(sh=>`<div class="tab ${sh.id===state.currentSheetId&&!isSummary?'active':''}"
        onclick="switchSheet('${sh.id}')" ondblclick="renameSheet('${sh.id}')">${escH(sh.name)}</div>`).join('')}
    </div>
    <div class="tab-add-fixed" onclick="openNewSheetModal()">＋</div>
  </div>`;

  const content=isSummary?renderSummarySheet(bk):renderSheetContent(bk);

  document.getElementById('mainContent').innerHTML=`
    <div class="book-header">
      <input class="book-title-input" value="${escH(bk.name)}" placeholder="台名・店名・機種を入力（例: ○○店 海物語 3番台）" oninput="updateBookName(this.value)">
      <textarea class="book-memo-input" rows="1" placeholder="メモ（任意）" oninput="updateBookMemo(this.value)">${escH(bk.memo)}</textarea>
      <div style="display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap">
        <span class="unit-badge">💴 ${price}円玉</span>
        <span class="unit-badge">🎰 ${balls}玉 / 1回</span>
        <span class="unit-badge">💸 ${fmtYen(roundCost)}円 / 1回</span>
      </div>
    </div>
    ${tabs}
    ${content}`;}

function sigmaBlock(data, det){
  const s=calcStats(data);
  if(!s) return`<div class="need-data">データを2件以上入力すると±σが表示されます</div>`;
  const span=s.hi2-s.lo2||1;
  const pct=v=>Math.max(0,Math.min(98,(v-s.lo2)/span*100));
  const lo1p=pct(s.lo1),hi1p=pct(s.hi1),mp=pct(s.mean);
  const j=judge(s.cv);

  // 回転単価計算
  function rotCost(rot, det){
    if(!det||!rot||rot<=0) return null;
    const {prob, payout, exchange, holdRatio, price, balls} = det;
    if(!prob||!payout||!exchange||holdRatio===null||holdRatio===undefined) return null;
    // 持玉時回転単価 = (出玉/確率 - 玉数/回転) × 交換率
    const holdt = (payout/prob - balls/rot) * exchange;
    // 現金時回転単価 = (出玉/確率 × 交換率) - (1000/回転)
    const casht = (payout/prob * exchange) - (1000/(rot*price*balls/1000));
    // 持玉比率考慮
    const mixed = holdt * holdRatio + casht * (1-holdRatio);
    return mixed;
  }

  function costHtml(rot, det){
    if(!det) return '';
    const c=rotCost(rot, det);
    if(c===null) return '';
    const cls=c>=0?'sigma-sub-pos':'sigma-sub-neg';
    return `<div class="sigma-sub ${cls}" style="text-align:right">回転単価 ${c>=0?'+':''}${c.toFixed(2)}円</div>`;
  }

  return`
    <div class="sigma-row"><span class="sigma-label">📊 平均回転数</span><span class="sigma-val sa">${s.mean.toFixed(2)} 回</span></div>
    <div class="sigma-row">
      <div><span class="sigma-label">±1σ（68%の範囲）</span></div>
      <div style="text-align:right;display:flex;align-items:flex-end;gap:4px">
        <div style="text-align:right"><span class="sigma-val" style="color:var(--yellow)">${s.lo1.toFixed(1)} 回</span>${costHtml(s.lo1,det)}</div>
        <span class="sigma-val" style="color:var(--muted2);align-self:flex-start">～</span>
        <div style="text-align:right"><span class="sigma-val" style="color:var(--yellow)">${s.hi1.toFixed(1)} 回</span>${costHtml(s.hi1,det)}</div>
      </div>
    </div>
    <div class="sigma-row">
      <div><span class="sigma-label">±2σ（95%の範囲）</span></div>
      <div style="text-align:right;display:flex;align-items:flex-end;gap:4px">
        <div style="text-align:right"><span class="sigma-val" style="color:#ff3366">${s.lo2.toFixed(1)} 回</span>${costHtml(s.lo2,det)}</div>
        <span class="sigma-val" style="color:var(--muted2);align-self:flex-start">～</span>
        <div style="text-align:right"><span class="sigma-val" style="color:#ff3366">${s.hi2.toFixed(1)} 回</span>${costHtml(s.hi2,det)}</div>
      </div>
    </div>
    <div class="dist-bar">
      <div class="bar-2s" style="left:0;width:100%"></div>
      <div class="bar-1s" style="left:${lo1p}%;width:${hi1p-lo1p}%"></div>
      <div class="bar-mean" style="left:${mp}%"></div>
    </div>
    <div class="judge-badge ${j.cls}">${j.text}</div>`;}

function renderSheetContent(bk){
  const sh=currentSheet();
  if(!sh){state.currentSheetId=bk.sheets[0]?.id;save();render();return'';}
  const data=sh.data, n=data.length;
  const price=parseFloat(bk.ballPrice)||4;
  const balls=parseInt(bk.ballsPerRound)||250;
  const roundCost=price*balls;
  const totalYen=n*roundCost;
  const totalBalls=n*balls;
  const totalRot=data.reduce((a,b)=>a+b,0);
  const perRound=n>0?(totalRot/n).toFixed(1):'—';
  // 千円あたり回転 = 1000円 / roundCost * 平均回転
  const per1000=n>0?(1000/roundCost*(totalRot/n)).toFixed(1):'—';

  const histHtml=data.length===0
    ?'<div class="empty-msg">まだデータがありません</div>'
    :data.map((v,i)=>`<div class="history-item"><span class="h-num">${i+1}</span><span>${v}</span><button class="btn-del" onclick="removeData('${sh.id}',${i})">✕</button></div>`).join('');

  const balLog=sh.balance||[];
  const totInv=balLog.reduce((a,b)=>a+b.inv,0);
  const totRec=balLog.reduce((a,b)=>a+b.rec,0);
  const totDiff=totRec-totInv;
  const balHtml=balLog.length===0
    ?'<div class="empty-msg" style="padding:6px 0">まだ収支の記録がありません</div>'
    :balLog.map((b,i)=>{
      const diff=b.rec-b.inv;
      return`<div class="balance-log-item">
        <span class="bl-num">${i+1}</span>
        <span class="bl-inv">${fmtYen(b.inv)}</span>
        <span class="bl-rec">${fmtYen(b.rec)}</span>
        <span class="bl-diff ${diff>=0?'bl-pos':'bl-neg'}">${diff>=0?'+':''}${fmtYen(diff)}</span>
        <button class="bl-del" onclick="removeBalance('${sh.id}',${i})">✕</button>
      </div>`;}).join('');

  // 台上カウンター（リセット後の追加分のみカウント）
  const counter=sh.counter||{init:0,postReset:0,open:false};
  // postReset = リセット後に追加されたデータのインデックス起点
  const postResetData=data.slice(counter.postReset||0);
  const counterTotal=counter.init + postResetData.reduce((a,b)=>a+b,0);

  // 詳細設定
  const det=sh.detail||{open:false};
  const detObj=(det.prob&&det.payout&&det.exchange&&det.holdRatio!==undefined&&det.holdRatio!=='')?{
    prob:parseFloat(det.prob),payout:parseFloat(det.payout),
    exchange:parseFloat(det.exchange),holdRatio:parseFloat(det.holdRatio)/100,
    price:parseFloat(bk.ballPrice)||4,balls:parseInt(bk.ballsPerRound)||250
  }:null;

  return`
    <div class="collapsible-panel">
      <div class="collapsible-header" onclick="toggleCounter('${sh.id}')">
        <span class="collapsible-header-left">▸ 台上カウンター</span>
        <span class="collapsible-toggle ${counter.open?'open':''}">▼</span>
      </div>
      ${counter.open?`<div class="collapsible-body" style="padding:8px 12px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">
            <span style="font-size:8px;color:var(--muted2);letter-spacing:1px">初期値</span>
            <input type="number" style="width:64px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;text-align:center;padding:4px 2px;outline:none;-webkit-appearance:none"
              id="counterInit_${sh.id}" value="${counter.init||''}" placeholder="0" min="0" inputmode="numeric">
            <button class="btn-counter-set" style="font-size:10px;padding:3px 6px;margin-top:2px" onclick="setCounterInit('${sh.id}')">確定</button>
          </div>
          <div style="flex:1;text-align:center">
            <div style="font-size:8px;color:var(--muted2);letter-spacing:1px;margin-bottom:2px">台上カウンター</div>
            <div style="font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;color:var(--yellow);text-shadow:0 0 14px rgba(255,215,0,0.5);line-height:1">${counterTotal}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:3px">初期値 ${counter.init} ＋ リセット後 ${postResetData.reduce((a,b)=>a+b,0)}</div>
          </div>
          <button class="btn-counter-clear" style="font-size:10px;padding:4px 8px;flex-shrink:0;align-self:center" onclick="clearCounterInit('${sh.id}')">リセット</button>
        </div>
      </div>`:''}
    </div>
    <div class="input-area">
      <div class="input-hint">🎰 ${balls}玉（${fmtYen(roundCost)}円）あたりの回転数を入力</div>
      <div class="input-row">
        <input type="number" id="rotInput" placeholder="回転数 / TY" min="1" max="99999" inputmode="numeric" onkeydown="if(event.key==='Enter')addData()">
        <button class="btn-add" id="btnAdd" onclick="addData()">追加</button>
      </div>
    </div>
    <div class="summary-grid-2">
      <div class="stat-card cp"><div class="stat-label">累計回転数</div><div class="stat-value vp">${totalRot}</div><div class="stat-unit">回転</div></div>
      <div class="stat-card co">
        <div class="stat-label">累計投資</div>
        <div class="stat-value vo" style="font-size:15px">${fmtYen(totalYen)}<span style="font-size:9px;font-family:'Noto Sans JP',sans-serif">円</span></div>
        <div class="stat-unit" style="margin-top:3px;font-size:9px">${fmtYen(totalBalls)}玉 ／ ${n}回</div>
      </div>
    </div>
    <div class="summary-grid-2">
      <div class="stat-card cg"><div class="stat-label">千円/回転</div><div class="stat-value vg">${per1000}</div><div class="stat-unit">回転/千円</div></div>
      <div class="stat-card ca"><div class="stat-label">平均回転 / 1回</div><div class="stat-value va">${perRound}</div><div class="stat-unit">回転（${balls}玉）</div></div>
    </div>
    <div class="sigma-panel">
      <div class="panel-title">▸ 統計分析</div>
      ${sigmaBlock(data,detObj)}
    </div>
    <div class="history-panel">
      <div class="history-header">
        <div class="panel-title">▸ 入力履歴</div>
        <button class="btn-danger" onclick="clearSheet('${sh.id}')">クリア</button>

          <input type="number" id="det_exchange_${sh.id}" value="${det.exchange||''}" placeholder="例: 3.57" min="0" step="0.01" inputmode="decimal" oninput="saveDetail('${sh.id}')">

        </div>

function renderSummarySheet(bk){
  const allData=bk.sheets.flatMap(s=>s.data);
  const n=allData.length;
  const price=parseFloat(bk.ballPrice)||4;
  const balls=parseInt(bk.ballsPerRound)||250;
  const roundCost=price*balls;
  const totalYen=n*roundCost;
  const totalBalls=n*balls;
  const totalRot=allData.reduce((a,b)=>a+b,0);
  const perRound=n>0?(totalRot/n).toFixed(1):'—';
  const per1000=n>0?(1000/roundCost*(totalRot/n)).toFixed(1):'—';

  const sheetCards=bk.sheets.map(sh=>{
    const dn=sh.data.length;
    const avg=dn>0?(sh.data.reduce((a,b)=>a+b,0)/dn).toFixed(1):'—';
    const yen=dn*roundCost;
    const bal=sh.balance||[];
    const bInv=bal.reduce((a,b)=>a+b.inv,0);
    const bRec=bal.reduce((a,b)=>a+b.rec,0);
    const bDiff=bRec-bInv;
    return`<div class="sheet-card">
      <div class="sc-name">📄 ${escH(sh.name)}</div>
      <div class="sc-val">${avg} <span style="font-size:10px;color:var(--muted2)">回転</span></div>
      <div class="sc-sub">${fmtYen(yen)}円 / ${dn}回</div>
      ${bal.length>0?`<div class="sc-sub" style="margin-top:4px;color:${bDiff>=0?'var(--green)':'var(--red)'}">収支 ${bDiff>=0?'+':''}${fmtYen(bDiff)}</div>`:''}
    </div>`}).join('');

  // 全シート収支合計
  const allBal=bk.sheets.flatMap(s=>s.balance||[]);
  const totInv=allBal.reduce((a,b)=>a+b.inv,0);
  const totRec=allBal.reduce((a,b)=>a+b.rec,0);
  const totDiff=totRec-totInv;

  return`
    <div class="summary-note">★ 全セッション合算の総合記録</div>
    <div class="summary-grid-2">
      <div class="stat-card cp">
        <div class="stat-label">累計回転数</div>
        <div class="stat-value vp">${totalRot}</div>
        <div class="stat-unit">回転</div>
      </div>

function addData(){
  const inp=document.getElementById('rotInput'); if(!inp) return;
  const v=parseInt(inp.value);
  if(isNaN(v)||v<=0||v>99999){inp.focus();return;}
  const sh=currentSheet(); if(!sh) return;
  sh.data.push(v); save(); inp.value='';
  const btn=document.getElementById('btnAdd');
  if(btn){ btn.classList.remove('flash'); void btn.offsetWidth; btn.classList.add('flash'); }
  render();
  scrollActiveTabIntoView();
  inp.focus();
  setTimeout(()=>{const hl=document.querySelector('.history-list');if(hl)hl.scrollTop=hl.scrollHeight;},50);
}

// アクティブなタブを常に画面内に表示
function scrollActiveTabIntoView(){
  setTimeout(()=>{
    const tw=document.getElementById('tabsWrapper');
    const active=tw?.querySelector('.tab.active');
    if(tw&&active){
      const twRect=tw.getBoundingClientRect();
      const tabRect=active.getBoundingClientRect();
      if(tabRect.left<twRect.left){
        tw.scrollLeft-=(twRect.left-tabRect.left+16);
      } else if(tabRect.right>twRect.right-44){
        tw.scrollLeft+=(tabRect.right-twRect.right+44+16);
      }
    }
  },30);
}

// PCマウスドラッグスクロール
function initTabDrag(){
  const tw=document.getElementById('tabsWrapper');
  if(!tw) return;
  let isDragging=false, startX=0, scrollStart=0;
  tw.addEventListener('mousedown',e=>{
    isDragging=true; startX=e.pageX; scrollStart=tw.scrollLeft;
    tw.style.cursor='grabbing'; e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!isDragging) return;
    tw.scrollLeft=scrollStart-(e.pageX-startX);
  });
  window.addEventListener('mouseup',()=>{
    isDragging=false; tw.style.cursor='';
  });
}
function removeData(sheetId,idx){

function clearCounterInit(sheetId){

function toggleDetail(sheetId){
  const bk=currentBook(); if(!bk) return;
  const sh=bk.sheets.find(s=>s.id===sheetId); if(!sh) return;

function saveDetail(sheetId){
  const bk=currentBook(); if(!bk) return;
  const sh=bk.sheets.find(s=>s.id===sheetId); if(!sh) return;
  if(!sh.detail) sh.detail={open:true};
  sh.detail.prob=document.getElementById('det_prob_'+sheetId)?.value||'';
  sh.detail.payout=document.getElementById('det_payout_'+sheetId)?.value||'';
  sh.detail.exchange=document.getElementById('det_exchange_'+sheetId)?.value||'';
  sh.detail.holdRatio=document.getElementById('det_hold_'+sheetId)?.value||'';
  save();
  // 統計パネルのみ更新（再renderしない→入力中にフォーカスが外れない）
  const data=sh.data;
  const det=sh.detail;
  const detObj=(det.prob&&det.payout&&det.exchange&&det.holdRatio!==undefined&&det.holdRatio!=='')?{
    prob:parseFloat(det.prob),payout:parseFloat(det.payout),
    exchange:parseFloat(det.exchange),holdRatio:parseFloat(det.holdRatio)/100,
    price:parseFloat(bk.ballPrice)||4,balls:parseInt(bk.ballsPerRound)||250
  }:null;
  const panel=document.querySelector('.sigma-panel');
  if(panel) panel.innerHTML=`<div class="panel-title">▸ 統計分析</div>${sigmaBlock(data,detObj)}`;
}

// ── CSV エクスポート ──
function downloadCSV(filename, content){
  const bom='\uFEFF'; // Excel用BOM
  const blob=new Blob([bom+content],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

function exportCSV(sheetId){
  const bk=currentBook(); if(!bk) return;
  const sh=bk.sheets.find(s=>s.id===sheetId); if(!sh) return;
  const price=parseFloat(bk.ballPrice)||4;
  const balls=parseInt(bk.ballsPerRound)||250;
  const roundCost=price*balls;
  let rows=['回数,回転数,投資金額（円）,玉数'];
  sh.data.forEach((v,i)=>{
    rows.push(`${i+1},${v},${roundCost},${balls}`);
  });
  rows.push('');
  rows.push('--- 収支記録 ---');
  rows.push('回数,投資,回収,収支');
  (sh.balance||[]).forEach((b,i)=>{
    rows.push(`${i+1},${b.inv},${b.rec},${b.rec-b.inv}`);
  });
  const name=`${escH(bk.name)||'台'}_${escH(sh.name)}`.replace(/[^\w\u3040-\u9fff]/g,'_');
  downloadCSV(`${name}.csv`, rows.join('\n'));
}

function exportAllCSV(){
  const bk=currentBook(); if(!bk) return;
  const price=parseFloat(bk.ballPrice)||4;
  const balls=parseInt(bk.ballsPerRound)||250;
  const roundCost=price*balls;
  let rows=['セッション,回数,回転数,投資金額（円）,玉数'];
  bk.sheets.forEach(sh=>{
    sh.data.forEach((v,i)=>{
      rows.push(`${escH(sh.name)},${i+1},${v},${roundCost},${balls}`);
    });
  });
  rows.push('');
  rows.push('--- 収支記録 ---');
  rows.push('セッション,回数,投資,回収,収支');
  bk.sheets.forEach(sh=>{
    (sh.balance||[]).forEach((b,i)=>{
      rows.push(`${escH(sh.name)},${i+1},${b.inv},${b.rec},${b.rec-b.inv}`);
    });
  });
  const name=`${escH(bk.name)||'全セッション'}`.replace(/[^\w\u3040-\u9fff]/g,'_');
  downloadCSV(`${name}_全セッション.csv`, rows.join('\n'));
}

// ── CSV インポート ──
function importCSV(event){
  const file=event.target.files[0]; if(!file) return;
  event.target.value=''; // 同じファイルを再選択できるようリセット
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result.replace(/^\uFEFF/,''); // BOM除去
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);

      // ヘッダー行で全セッション版か単セッション版か判定
      const header=lines[0];
      let imported=0, sheetMap={};

      if(header.startsWith('セッション,')){ // 全セッションCSV
        let inBalance=false;
        for(let i=1;i<lines.length;i++){
          const row=lines[i];
          if(row.startsWith('---')){inBalance=true;continue;}
          if(inBalance){
            // 収支: セッション,回数,投資,回収,収支
            const cols=row.split(',');
            if(cols.length<4) continue;
            const sName=cols[0], inv=parseInt(cols[2])||0, rec=parseInt(cols[3])||0;
            if(!sheetMap[sName]) sheetMap[sName]={data:[],balance:[]};
            sheetMap[sName].balance.push({inv,rec});
          } else {
            // 回転数: セッション,回数,回転数,投資金額,玉数
            const cols=row.split(',');
            if(cols.length<3) continue;
            const sName=cols[0], val=parseInt(cols[2]);
            if(isNaN(val)||val<=0) continue;
            if(!sheetMap[sName]) sheetMap[sName]={data:[],balance:[]};
            sheetMap[sName].data.push(val);
            imported++;
          }
        }
      } else if(header.startsWith('回数,')){ // 単セッションCSV
        const sName='インポート_'+todayStr();
        sheetMap[sName]={data:[],balance:[]};
        let inBalance=false;
        for(let i=1;i<lines.length;i++){
          const row=lines[i];
          if(row.startsWith('---')){inBalance=true;continue;}
          if(inBalance){
            const cols=row.split(',');
            if(cols.length<3) continue;
            const inv=parseInt(cols[1])||0, rec=parseInt(cols[2])||0;
            sheetMap[sName].balance.push({inv,rec});
          } else {
            const cols=row.split(',');
            if(cols.length<2) continue;
            const val=parseInt(cols[1]);
            if(isNaN(val)||val<=0) continue;
            sheetMap[sName].data.push(val);
            imported++;
          }
        }
      } else {
        showImportResult('❌ 対応していないCSV形式です。<br>このツールでエクスポートしたCSVファイルを使用してください。');
        return;
      }

      if(imported===0){
        showImportResult('❌ 有効なデータが見つかりませんでした。');
        return;
      }

      // 新しいブックを作成してシートを追加
      const bookId=uid();
      const fileName=file.name.replace('.csv','').replace(/_/g,' ');
      const sheets=Object.entries(sheetMap).map(([name,sd])=>({
        id:uid(), name:name, data:sd.data, balance:sd.balance
      }));
      if(sheets.length===0){
        showImportResult('❌ セッションデータが見つかりませんでした。');
        return;
      }
      state.books.push({
        id:bookId, name:fileName, memo:'CSVからインポート',
        ballPrice:'4', ballsPerRound:'250',
        sheets:sheets
      });
      state.currentBookId=bookId;
      state.currentSheetId=sheets[0].id;
      save(); closeSidebar(); render();
      showImportResult(`✅ インポート完了！<br><br>回転数データ：${imported}件<br>セッション数：${sheets.length}件<br><br>新しいブックとして追加しました。<br>玉単価・玉数の設定は必要に応じて新しいブックを作り直してください。`);
    } catch(err){
      showImportResult('❌ 読み込みエラーが発生しました。<br>ファイルを確認してください。');
    }
  };
  reader.readAsText(file,'UTF-8');
}
