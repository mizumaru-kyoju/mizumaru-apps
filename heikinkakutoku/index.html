<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root {
  --bg:#0e0900;

  --panel2:#211800;
  --border:#332200;
  --border2:#4a3300;
  --accent:#ffaa00;

  --green:#aaff44;
  --red:#ff4444;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;max-width:520px;margin:0 auto;padding-bottom:60px}

.topbar{background:rgba(14,9,0,0.97);border-bottom:2px solid var(--accent);padding:10px 14px;text-align:center}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--accent);text-shadow:var(--glow)}

.memo-input{width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:7px 10px;outline:none;resize:none}
.memo-input::placeholder{color:var(--muted2)}
.memo-input:focus{border-color:var(--accent)}

.main{padding:10px}

/* SECTION */
.section{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}

/* COMMON */
.common-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field label{display:block;font-size:8px;color:var(--muted2);letter-spacing:1px;margin-bottom:3px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--accent);font-family:'Orbitron',sans-serif;font-size:16px;text-align:center;padding:7px 4px;outline:none;-webkit-appearance:none}
.field input:focus{border-color:var(--accent);box-shadow:var(--glow)}
.field input::placeholder{color:var(--muted);font-size:11px;font-family:'Noto Sans JP',sans-serif}

/* UNIFIED TABLE */
.unified-table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.unified-table th{font-size:8px;color:var(--muted2);letter-spacing:1px;padding:5px 2px;border-bottom:1px solid var(--border2);text-align:center;white-space:nowrap}
.unified-table col.col-s   {width:38px}
.unified-table col.col-in  {width:calc((100% - 38px) / 5)}
.unified-table col.col-rtp {width:calc((100% - 38px) / 5)}
.unified-table col.col-x   {width:calc((100% - 38px) / 5)}
.unified-table col.col-ty  {width:calc((100% - 38px) / 5)}
.unified-table col.col-diff{width:calc((100% - 38px) / 5)}

.unified-table td{padding:5px 2px;text-align:center;border-bottom:1px solid var(--border)}
.unified-table tr:last-child td{border-bottom:none}
.unified-table tr.row-alt td{background:var(--row-alt)}
.unified-table tr.row-alt input{background:#0a0700}

.tbl-input{background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'Orbitron',sans-serif;font-size:11px;text-align:center;padding:4px 1px;outline:none;width:100%;-webkit-appearance:none;min-width:0}
.tbl-input:focus{border-color:var(--accent)}
.tbl-input::placeholder{color:var(--muted);font-size:9px;font-family:'Noto Sans JP',sans-serif}
.tbl-x{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--blue)}

<script>
function buildTable(){
  const tbody=document.getElementById('unifiedBody');
  tbody.innerHTML='';
  for(let s=1;s<=6;s++){
    const tr=document.createElement('tr');
    if(s%2===0) tr.className='row-alt';
    const placeholders = [
      ['394.4','97.5'],
      ['380.5','99.0'],
      ['357.0','101.6'],
      ['325.9','105.6'],
      ['291.2','110.3'],
      ['261.3','114.9']
    ];
    tr.innerHTML=`
      <td class="tbl-label">設定${s}</td>
      <td><input class="tbl-input" id="prob${s}" type="number" placeholder="${placeholders[s-1][0]}" step="0.1" min="0" inputmode="decimal"></td>
      <td><input class="tbl-input" id="rtp${s}" type="number" placeholder="${placeholders[s-1][1]}" step="0.1" min="0" inputmode="decimal"></td>
      <td class="tbl-x" id="rx${s}">—</td>
      <td class="tbl-ty" id="rty${s}">—</td>
      <td id="rdiff${s}" class="tbl-empty">—</td>`;
    tbody.appendChild(tr);
  }
}
buildTable();

function calculate(){
  const C=parseFloat(document.getElementById('pureIncrease').value);
  const G=parseFloat(document.getElementById('baseG').value);
  if(isNaN(C)||C<=0||isNaN(G)||G<=0){
    alert('AT純増とベースG数を入力してください');return;
  }
  const results=[];
  for(let s=1;s<=6;s++){
    const B=parseFloat(document.getElementById('prob'+s).value);
    const A=parseFloat(document.getElementById('rtp'+s).value);
    document.getElementById('rx'+s).textContent='—';
    document.getElementById('rty'+s).textContent='—';
    document.getElementById('rty'+s).style.color='';
    document.getElementById('rty'+s).style.textShadow='';
    document.getElementById('rdiff'+s).textContent='—';
    document.getElementById('rdiff'+s).className='tbl-empty';
    if(isNaN(B)||B<=0||isNaN(A)||A<=0){results.push(null);continue;}
    const rtpD=A/100;
    const num=B*(3-50/G-rtpD*3);
    const den=rtpD*3-3-C;
    if(Math.abs(den)<0.0001){results.push({error:true});continue;}
    const X=num/den;
    const TY=X*C;
    const investCoins=B/G*50;
    const diff=TY-investCoins;
    if(X<0||TY<0){results.push({error:true});continue;}
    results.push({s,B,A,X,TY,investCoins,diff});
    document.getElementById('rx'+s).textContent=X.toFixed(1)+'G';
    document.getElementById('rty'+s).textContent=TY.toFixed(1);
    const diffEl=document.getElementById('rdiff'+s);
    diffEl.textContent=(diff>=0?'+':'')+diff.toFixed(1);
    diffEl.className=diff>=0?'tbl-diff-pos':'tbl-diff-neg';
  }
  renderChart(results,C,G);
}

function getBarColor(value,values){
  if(values.length<2) return{fill:'#ffaa00',text:'#000'};
  const mean=values.reduce((a,b)=>a+b,0)/values.length;
  const sd=Math.sqrt(values.reduce((s,v)=>s+(v-mean)**2,0)/values.length);
  if(sd<1) return{fill:'#ffaa00',text:'#000'};
  const z=(value-mean)/sd;
  if(z>1.0)  return{fill:'#aaff44',text:'#000'};
  if(z<-1.0) return{fill:'#ff4444',text:'#fff'};
  return{fill:'#ffaa00',text:'#000'};
}

function renderChart(results,C,G){
  const valid=results.filter(r=>r&&!r.error);
  if(valid.length===0){document.getElementById('chartSection').style.display='none';return;}
  const tyVals=valid.map(r=>r.TY);
  const maxTY=Math.max(...tyVals);

  // TYセルの色をグラフと同期
  valid.forEach(r=>{
    const col=getBarColor(r.TY,tyVals);
    const el=document.getElementById('rty'+r.s);
    el.style.color=col.fill;
    el.style.textShadow=`0 0 10px ${col.fill}88`;
  });

  let html='';
  results.forEach((r,i)=>{
    if(!r||r.error) return;
    const pct=Math.max(4,(r.TY/maxTY)*100);
    const col=getBarColor(r.TY,tyVals);
    html+=`<div class="bar-row">
      <div class="bar-lbl">${r.s}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${col.fill}">
          <span class="bar-num" style="color:${col.text}">${r.TY.toFixed(0)}</span>
        </div>
      </div>
      <div class="bar-out" style="color:${col.fill}">${r.TY.toFixed(1)}</div>
    </div>`;
  });
  document.getElementById('barChart').innerHTML=html;
  const minTY=Math.min(...tyVals),maxTYv=Math.max(...tyVals);
  document.getElementById('resultNote').innerHTML=
    `AT純増 ${C}枚/G・ベース ${G}G/50枚で計算<br>`+
    `TY範囲: ${minTY.toFixed(1)} ～ ${maxTYv.toFixed(1)}枚（差 ${(maxTYv-minTY).toFixed(1)}枚）<br>`+
    `🟢 平均+1σ超、🔴 平均-1σ未満を強調表示`;
  document.getElementById('chartSection').style.display='block';
  document.getElementById('btnSave').style.display='block';
}

function resetAll(){
  document.getElementById('pureIncrease').value='';
  document.getElementById('baseG').value='';
  document.getElementById('memoText').value='';
  for(let s=1;s<=6;s++){
    document.getElementById('prob'+s).value='';
    document.getElementById('rtp'+s).value='';
    document.getElementById('rx'+s).textContent='—';
    const tyEl=document.getElementById('rty'+s);
    tyEl.textContent='—';
    tyEl.style.color='';
    tyEl.style.textShadow='';
    document.getElementById('rdiff'+s).textContent='—';
    document.getElementById('rdiff'+s).className='tbl-empty';
  }
  document.getElementById('chartSection').style.display='none';
  document.getElementById('btnSave').style.display='none';
}

// ── 保存・読み込み ──
function loadSaved(){
  try{ return JSON.parse(localStorage.getItem('at_saved')||'[]'); }
  catch(e){ return []; }
}
function saveSaved(list){ localStorage.setItem('at_saved', JSON.stringify(list)); }

function saveEntry(){
  const memo=document.getElementById('memoText').value.trim();
  const name=memo||'名称未設定';
  const C=document.getElementById('pureIncrease').value;
  const G=document.getElementById('baseG').value;
  const probs=[],rtps=[];
  for(let s=1;s<=6;s++){
    probs.push(document.getElementById('prob'+s).value);
    rtps.push(document.getElementById('rtp'+s).value);
  }
  const entry={id:Date.now().toString(36),name,memo,C,G,probs,rtps};
  const list=loadSaved();
  // 同名があれば上書き確認
  const idx=list.findIndex(e=>e.name===name);
  if(idx>=0){
    list[idx]=entry;
  } else {
    list.push(entry);
  }
  // あいうえお順ソート
  list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  saveSaved(list);
  document.getElementById('btnSave').textContent='✅ 保存しました';
  setTimeout(()=>{ document.getElementById('btnSave').textContent='💾 この機種を保存'; },1500);
}

function loadEntry(id){
  const list=loadSaved();
  const e=list.find(e=>e.id===id); if(!e) return;
  document.getElementById('memoText').value=e.memo||e.name;
  document.getElementById('pureIncrease').value=e.C;
  document.getElementById('baseG').value=e.G;
  for(let s=1;s<=6;s++){
    document.getElementById('prob'+s).value=e.probs[s-1]||'';
    document.getElementById('rtp'+s).value=e.rtps[s-1]||'';
  }
  closeSidebar();
  calculate();
}

function deleteEntry(id){
  let list=loadSaved();
  list=list.filter(e=>e.id!==id);
  saveSaved(list);
  renderSidebar();
}

function renderSidebar(){
  const list=loadSaved();
  const el=document.getElementById('savedList');
  if(list.length===0){
    el.innerHTML='<div class="saved-empty">保存済みの機種はありません</div>';
    return;
  }
  el.innerHTML=list.map(e=>`
    <div class="saved-item" onclick="loadEntry('${e.id}')">
      <div class="saved-info">
        <div class="saved-name">${escH(e.name)}</div>
        <div class="saved-meta">純増 ${e.C}枚 / ベース ${e.G}G</div>
      </div>
      <button class="btn-del-saved" onclick="event.stopPropagation();deleteEntry('${e.id}')">🗑</button>
    </div>`).join('');
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openSidebar(){ renderSidebar(); document.getElementById('overlay').classList.add('open'); }
function closeSidebar(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

// Service Worker登録（PWA対応）
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/heikinkakutoku/sw.js').catch(()=>{});
  });
}
</script>
